# Angular dev server only. Run from this directory: `docker compose up`
# Optional: copy `compose.env.example` to `compose.env` and run `docker compose --env-file compose.env up`
# Default UI port on the host: 4730 (override with ADG_UI_PORT).

name: adg-ui

services:
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: adg-ui
    restart: unless-stopped
    ports:
      - "${ADG_UI_PORT:-4730}:${ADG_UI_PORT:-4730}"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    # `ng` global puede ser otra versión de Angular y romper el compilador; usar la CLI de node_modules.
    command:
      - ./node_modules/.bin/ng
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "${ADG_UI_PORT:-4730}"
      - --poll
      - "2000"
    volumes:
      - .:/app
      - adg_ui_node_modules:/app/node_modules
    stdin_open: true
    tty: true

volumes:
  adg_ui_node_modules:
