version: '3.8'

services:
  adg-ui-services:
    build: .
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    command: ng serve --host 0.0.0.0 --port 4200 --poll 2000
    stdin_open: true
    tty: true
