<div class="ranch-form border rounded p-3 mb-3 bg-light">
  <h6 class="mb-3">{{ mode === 'edit' ? ('saas.editRanch' | t) : ('saas.createRanch' | t) }}</h6>
  <div class="row g-2">
    <div class="col-md-4">
      <label class="form-label mb-1" for="ranch-form-name">{{ 'saas.ranchName' | t }}</label>
      <input
        id="ranch-form-name"
        class="form-control"
        [(ngModel)]="value.name"
        [class.is-invalid]="submitAttempted && !(value.name || '').trim()"
      />
      <div class="invalid-feedback d-block" *ngIf="submitAttempted && !(value.name || '').trim()">
        {{ 'saas.validation.ranchNameRequired' | t }}
      </div>
    </div>
    <div class="col-md-4">
      <label class="form-label mb-1" for="ranch-form-location">{{ 'saas.ranchLocation' | t }}</label>
      <input id="ranch-form-location" class="form-control" [(ngModel)]="value.location" />
    </div>
    <div class="col-md-4">
      <label class="form-label mb-1" for="ranch-form-area">{{ 'saas.ranchArea' | t }} ha</label>
      <input id="ranch-form-area" class="form-control" [(ngModel)]="value.area" />
    </div>
  </div>
  <div class="mt-3">
    <button type="button" class="btn btn-primary me-2" (click)="onSubmit()" [disabled]="loading">
      {{ submitLabelKey | t }}
    </button>
    <button type="button" class="btn btn-outline-secondary" (click)="onCancel()" [disabled]="loading">
      {{ cancelLabelKey | t }}
    </button>
  </div>
</div>
