<div class="container-fluid company-ranch-create">
  <div class="app-page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h3 class="app-page-title mb-0">{{ 'saas.createRanch' | t }}</h3>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cancel()">
      {{ 'common.back' | t }}
    </button>
  </div>

  <p class="text-danger mt-2" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="app-card p-3 mt-3" *ngIf="company && !isLoading">
    <p class="text-muted small mb-3">{{ company.name }}</p>
    <app-ranch-form
      mode="create"
      [value]="ranchForm"
      [loading]="isSaving"
      [submitLabelKey]="'common.save'"
      [cancelLabelKey]="'common.cancel'"
      (submitForm)="save($event)"
      (cancelForm)="cancel()"
    ></app-ranch-form>
  </div>

  <div class="app-card p-3 mt-3 text-muted" *ngIf="!isLoading && !company && !errorMessage">
    {{ 'saas.companyNotFound' | t }}
  </div>
</div>
