<div class="container-fluid home-dashboard">
    <div class="app-page-header">
      <h2 class="app-page-title">CattlePro Workspace</h2>
    </div>
    <div class="row g-3">
      <div class="col-xl-4 col-md-6">
        <button
          type="button"
          class="card app-card home-module-card w-100 text-start"
          (click)="openAnimalTable()"
          (keydown)="openAnimalTableFromKeyboard($event)"
        >
          <div class="card-header">{{ 'home.animalTitle' | t }}</div>
          <div class="card-body">
            <p class="card-text mb-3">{{ 'home.animalDescription' | t }}</p>
            <img src="../../../../../assets/general_table_background.jpg" class="img-fluid home-module-card__image" alt="Animal module card"/>
          </div>
        </button>
      </div>
    </div>
</div>
