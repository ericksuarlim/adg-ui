<div class="container-fluid animal-individual">
  <div class="app-page-header d-flex flex-wrap align-items-center justify-content-between gap-2">
    <h2 class="app-page-title mb-0">{{ 'animal.individualRegisterTitle' | t }}</h2>
    <div class="d-flex flex-wrap gap-2">
      <a class="btn btn-outline-secondary btn-sm" routerLink="/animal/register/batch">{{ 'animal.batchRegisterTitle' | t }}</a>
      <a class="btn btn-outline-secondary btn-sm" routerLink="/animal">{{ 'common.back' | t }}</a>
    </div>
  </div>

  <p class="text-muted small mb-1">{{ 'animal.individualRegisterSubtitle' | t }}</p>
  <p class="text-muted small mb-3 animal-form-fields-legend">{{ 'animal.formFieldsLegend' | t }}</p>

  <div *ngIf="feedback" class="alert" [ngClass]="feedback.type === 'success' ? 'alert-success' : 'alert-danger'" role="status">
    {{ feedback.message }}
  </div>

  <div class="app-card p-3 animal-individual-card">
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label small mb-1" for="ranchUuid">{{ 'animal.fieldRanch' | t }} *</label>
          <select id="ranchUuid" class="form-select form-select-sm" formControlName="ranchUuid">
            <option value="">{{ 'animal.selectRanch' | t }}</option>
            <option *ngFor="let r of ranchRows" [value]="r.uuid_ranch">{{ r.name }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="registrationNumber">{{ 'animal.fieldRegistrationNumber' | t }} *</label>
          <input id="registrationNumber" class="form-control form-control-sm" type="text" formControlName="registrationNumber" autocomplete="off" />
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="breedCode">{{ 'animal.fieldBreed' | t }} *</label>
          <select id="breedCode" class="form-select form-select-sm" formControlName="breedCode">
            <option *ngFor="let b of breedRows" [value]="b.code">{{ breedLabel(b.code) }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="sex">{{ 'animal.fieldSex' | t }} *</label>
          <select id="sex" class="form-select form-select-sm" formControlName="sex">
            <option value="MALE">{{ 'animal.sexMaleApi' | t }}</option>
            <option value="FEMALE">{{ 'animal.sexFemaleApi' | t }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="originType">{{ 'animal.fieldOriginType' | t }} *</label>
          <select id="originType" class="form-select form-select-sm" formControlName="originType">
            <option value="UNKNOWN">{{ 'animal.originUnknown' | t }}</option>
            <option value="BIRTH">{{ 'animal.originBirth' | t }}</option>
            <option value="PURCHASE">{{ 'animal.originPurchase' | t }}</option>
            <option value="TRANSFER">{{ 'animal.originTransfer' | t }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="motherRegistrationNumber">
            {{ 'animal.fieldMotherRegistration' | t }}
            <span class="text-muted fw-normal animal-optional-mark">{{ 'animal.optionalParen' | t }}</span>
          </label>
          <select id="motherRegistrationNumber" class="form-select form-select-sm" formControlName="motherRegistrationNumber">
            <option value="">{{ 'animal.optionNone' | t }}</option>
            <option *ngFor="let p of motherOptions" [value]="p.registration_number">{{ p.registration_number }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="fatherRegistrationNumber">
            {{ 'animal.fieldFatherRegistration' | t }}
            <span class="text-muted fw-normal animal-optional-mark">{{ 'animal.optionalParen' | t }}</span>
          </label>
          <select id="fatherRegistrationNumber" class="form-select form-select-sm" formControlName="fatherRegistrationNumber">
            <option value="">{{ 'animal.optionNone' | t }}</option>
            <option *ngFor="let p of fatherOptions" [value]="p.registration_number">{{ p.registration_number }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="currentOwnerUuid">
            {{ 'animal.fieldOwner' | t }}
            <span class="text-muted fw-normal animal-optional-mark">{{ 'animal.optionalParen' | t }}</span>
          </label>
          <select id="currentOwnerUuid" class="form-select form-select-sm" formControlName="currentOwnerUuid">
            <option value="">{{ 'animal.optionNone' | t }}</option>
            <option *ngFor="let o of ownerRows" [value]="o.owner_uuid">{{ o.full_name }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="currentPaddockUuid">
            {{ 'animal.fieldPaddock' | t }}
            <span class="text-muted fw-normal animal-optional-mark">{{ 'animal.optionalParen' | t }}</span>
          </label>
          <select id="currentPaddockUuid" class="form-select form-select-sm" formControlName="currentPaddockUuid">
            <option value="">{{ 'animal.optionNone' | t }}</option>
            <option *ngFor="let p of paddockOptions" [value]="p.paddock_uuid">{{ p.name }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="color">
            {{ 'animal.fieldColor' | t }}
            <span class="text-muted fw-normal animal-optional-mark">{{ 'animal.optionalParen' | t }}</span>
          </label>
          <input id="color" class="form-control form-control-sm" type="text" formControlName="color" autocomplete="off" />
        </div>
        <div class="col-md-6">
          <label class="form-label small mb-1" for="birthYear">{{ 'animal.fieldBirthYear' | t }} *</label>
          <input
            id="birthYear"
            class="form-control form-control-sm"
            type="number"
            formControlName="birthYear"
            autocomplete="bday-year"
            inputmode="numeric"
            [min]="1900"
            [max]="maxBirthYear"
            placeholder="YYYY"
          />
        </div>
        <div class="col-12">
          <label class="form-label small mb-1" for="description">
            {{ 'animal.fieldDescription' | t }}
            <span class="text-muted fw-normal animal-optional-mark">{{ 'animal.optionalParen' | t }}</span>
          </label>
          <input id="description" class="form-control form-control-sm" type="text" formControlName="description" autocomplete="off" />
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary btn-sm" [disabled]="saving">{{ 'animal.individualSave' | t }}</button>
      </div>
    </form>
  </div>
</div>
