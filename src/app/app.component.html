<div class="app-shell" [ngClass]="{'theme-light': currentTheme === 'light', 'theme-dark': currentTheme === 'dark'}">
  <app-navbar
    *ngIf="user != null"
    [isSidebarOpen]="openSidebar"
    (toggleSidebarToParent)="toggleSidebarToParent($event)"
    (themeChanged)="onThemeChange($event)"
  ></app-navbar>

  <div class="app-layout" *ngIf="user != null; else guestLayout">
    <button type="button" class="app-sidebar-backdrop" [class.show]="openSidebar" (click)="openSidebar = false" aria-label="Close sidebar"></button>
    <app-sidebar [classApplied]="openSidebar" (sidebarLinkClicked)="openSidebar = false"></app-sidebar>
    <main class="app-main">
      <router-outlet></router-outlet>
    </main>
  </div>

  <ng-template #guestLayout>
    <main class="app-main app-main-guest">
      <router-outlet></router-outlet>
    </main>
  </ng-template>
</div>
